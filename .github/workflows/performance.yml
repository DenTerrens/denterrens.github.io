name: performance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  jmeter-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JMeter
        run: |
          curl -L https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -o jmeter.tgz
          tar -xzf jmeter.tgz

      - name: Run JMeter plan
        run: |
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t performance/jmeter/plans/reqres-smoke.jmx \
            -l performance/jmeter/results.jtl \
            -Jjmeter.save.saveservice.output_format=csv \
            -Jjmeter.save.saveservice.label=true \
            -Jjmeter.save.saveservice.response_code=true \
            -Jjmeter.save.saveservice.response_message=true \
            -Jjmeter.save.saveservice.successful=true \
            -Jjmeter.save.saveservice.thread_name=true \
            -Jjmeter.save.saveservice.bytes=true \
            -Jjmeter.save.saveservice.sent_bytes=true \
            -Jjmeter.save.saveservice.latency=true \
            -Jjmeter.save.saveservice.connect_time=true \
            -Jjmeter.save.saveservice.time=true \
            -Jjmeter.save.saveservice.timestamp_format=ms \
            -e -o performance/jmeter/report

      - name: Publish JMeter summary
        if: always()
        run: |
          python3 - <<'PY'
          import csv
          import os
          from pathlib import Path

          result_path = Path('performance/jmeter/results.jtl')
          if not result_path.exists():
              print('JMeter summary: results.jtl was not generated.')
              raise SystemExit(0)

          rows = list(csv.DictReader(result_path.open(newline='', encoding='utf-8')))
          if not rows:
              print('JMeter summary: results.jtl is empty.')
              raise SystemExit(0)

          sample_count = len(rows)
          failures = [row for row in rows if row.get('success', '').lower() != 'true']
          durations = sorted(int(row['elapsed']) for row in rows if row.get('elapsed'))
          avg_ms = round(sum(durations) / len(durations), 2) if durations else 0
          min_ms = durations[0] if durations else 0
          max_ms = durations[-1] if durations else 0
          p95_index = max(0, min(len(durations) - 1, int(len(durations) * 0.95) - 1)) if durations else 0
          p95_ms = durations[p95_index] if durations else 0

          summary_lines = [
              'JMeter smoke summary',
              f'Samples: {sample_count}',
              f'Failures: {len(failures)}',
              f'Average response time: {avg_ms} ms',
              f'Minimum response time: {min_ms} ms',
              f'Maximum response time: {max_ms} ms',
              f'Approx. 95th percentile: {p95_ms} ms',
          ]

          print('\n'.join(summary_lines))

          step_summary = Path(os.environ['GITHUB_STEP_SUMMARY'])
          with step_summary.open('a', encoding='utf-8') as handle:
              handle.write('## JMeter smoke summary\n')
              for line in summary_lines[1:]:
                  label, value = line.split(': ', 1)
                  handle.write(f'- {label}: {value}\n')
          PY

      - name: Upload JMeter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-artifacts
          path: |
            performance/jmeter/results.jtl
            performance/jmeter/report
          if-no-files-found: ignore
