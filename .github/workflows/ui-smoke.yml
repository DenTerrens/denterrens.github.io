name: ui-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  playwright-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Execute UI smoke suite
        run: mvn -B clean test -Pui -Dgroups=ui -Dheadless=true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results
          if-no-files-found: ignore
